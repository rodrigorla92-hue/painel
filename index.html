<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body { background:#111; color:white; text-align:center; }

.rack {
  border:2px solid #555;
  margin:10px;
  padding:10px;
  display:inline-block;
}

.comp {
  padding:10px;
  margin:5px;
  border-radius:5px;
}

.on { background:green; }
.off { background:red; }

.led {
  width:15px;
  height:15px;
  border-radius:50%;
  background:red;
  margin:auto;
  margin-bottom:5px;
}

.online {
  animation: piscar 1s infinite;
  background: lime !important;
}

.degelo {
  background: blue !important;
}

.temp {
  font-size:18px;
  margin:10px;
  color:cyan;
}

@keyframes piscar {
  50% { opacity:0.2; }
}

button {
  margin:5px;
  padding:8px;
}
</style>

</head>

<body>

<h1>Painel Geral</h1>

<div id="painel"></div>

<script>

const TOTAL_RACKS = 9;
const TOTAL_COMPRESSORES = 4;
const TOTAL_RESETS = 4;

const NOMES_RACKS = [
  "tunel 01 cremes",
  "tunel 02",
  "tunel 03",
  "camara fria sucos",
  "tunel 04",
  "chiler",
  "tunel 05",
  "camara fria 01",
  "camara fria 02",
];

const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

const painel = document.getElementById("painel");

let tempoRack = {};

// ================= CRIA INTERFACE =================
for(let r=1; r<=TOTAL_RACKS; r++){

  let rack = document.createElement("div");
  rack.className = "rack";

  let nome = NOMES_RACKS[r-1] || `Rack ${r}`;

  rack.innerHTML = `
    <h2>${nome}</h2>

    <div class="temp" id="temp${r}">
      -- Â°C
    </div>

    <div style="display:flex; justify-content:center; gap:15px;">
      <div>
        <div id="led${r}" class="led"></div>
        <small>Online</small>
      </div>

      <div>
        <div id="degelo${r}" class="led"></div>
        <small>Degelo</small>
      </div>
    </div>
  `;

  for(let c=1; c<=TOTAL_COMPRESSORES; c++){
    rack.innerHTML += `
      <div id="r${r}c${c}" class="comp off">
        C${c}
      </div>
    `;
  }

  for(let b=1; b<=TOTAL_RESETS; b++){
    rack.innerHTML += `
      <button onclick="reset('rack${r}/reset${b}')">
        -----
      </button>
    `;
  }

  painel.appendChild(rack);

  tempoRack[r] = Date.now();
}

// ================= MQTT =================
client.on('connect', ()=>{

  console.log("Conectado ao MQTT");

  for(let r=1; r<=TOTAL_RACKS; r++){

    for(let c=1; c<=TOTAL_COMPRESSORES; c++){
      client.subscribe(`rack${r}/c${c}`);
    }

    client.subscribe(`rack${r}/status`);
    client.subscribe(`rack${r}/degelo`);
    client.subscribe(`rack${r}/temp`);
  }
});

// ================= RECEBE =================
client.on('message',(topic,msg,packet)=>{

  // đźš« IGNORA MENSAGEM RETIDA
  if(packet.retain){
    console.log("Ignorado (retido):", topic);
    return;
  }

  msg = msg.toString();

  for(let r=1; r<=TOTAL_RACKS; r++){

    // STATUS
    if(topic === `rack${r}/status`){
      tempoRack[r] = Date.now();
      document.getElementById("led"+r).classList.add("online");
    }

    // DEGELO
    if(topic === `rack${r}/degelo`){
      let led = document.getElementById("degelo"+r);
      msg === "ON" ? led.classList.add("degelo") : led.classList.remove("degelo");
    }

    // TEMPERATURA
    if(topic === `rack${r}/temp`){
      document.getElementById("temp"+r).innerHTML = msg + " Â°C";
    }

    // COMPRESSORES
    for(let c=1; c<=TOTAL_COMPRESSORES; c++){
      if(topic === `rack${r}/c${c}`){
        atualizar(`r${r}c${c}`, msg);
      }
    }
  }
});

// ================= QUEDA =================
setInterval(()=>{

  let agora = Date.now();

  for(let r=1; r<=TOTAL_RACKS; r++){
    if(agora - tempoRack[r] > 3000){
      document.getElementById("led"+r).classList.remove("online");
    }
  }

},1000);

// ================= VISUAL =================
function atualizar(id, estado){

  let el = document.getElementById(id);

  el.classList.remove("on","off");

  el.classList.add(
    estado === "ON" ? "on" : "off"
  );
}

</script>

</body>
</html>
